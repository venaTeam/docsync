# docsync — CI gate.
#
# The dogfood loop (`docsync-self.yml`) proves docsync end-to-end, but nothing guarded
# *changes to docsync itself*. This workflow does: every PR and every push to `main`
# must pass lint + the offline test suite. Both are fast and free — no API key, no
# network (tests fake the LLM client, keyed on output_format).
#
# A second, currently NON-BLOCKING job wires the regression-eval gate
# (`docsync eval --mode map --min-recall …`). It activates as a hard gate once a
# *self-docs* golden set exists at tests/eval/golden_selfdocs.json — one anchored to
# THIS repo's manifest (which anchors `docsync`), not the Keep-docs golden.json fixture.
# See the eval-gate job for how to flip it on.
name: ci

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  test:
    name: lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install (with the embeddings extra so all modules import)
        run: poetry install -E embeddings

      - name: Ruff (lint — the declared gate; nothing ran it before)
        run: poetry run ruff check src/ tests/

      - name: Pytest (full offline suite — no network, no API key)
        run: poetry run pytest -q

  eval-gate:
    name: mapping-accuracy gate (map-mode)
    runs-on: ubuntu-latest
    # Non-blocking until a self-docs golden set is curated (then drop this line so a
    # recall regression fails the build). The gate mechanism is real and tested
    # (eval.threshold_breaches); only the golden data is pending.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install (embeddings extra for the recall-net)
        run: poetry install -E embeddings

      - name: Run the map-mode regression gate (free — anchors only, no LLM)
        # GH_TOKEN lets `diff_github` fetch each golden case's diff via the API.
        # --min-recall makes a mapping-recall regression exit non-zero. Skips cleanly
        # until the self-docs golden set lands so the workflow stays green meanwhile.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GOLDEN=tests/eval/golden_selfdocs.json
          if [ -f "$GOLDEN" ]; then
            poetry run docsync eval \
              --docs-repo . --golden "$GOLDEN" --mode map --min-recall 0.80
          else
            echo "No self-docs golden set yet ($GOLDEN) — skipping the eval gate."
            echo "Curate one (docsync's own commits → the docs/ pages they should touch)"
            echo "to turn mapping recall into a hard CI gate. See tests/eval/golden.json"
            echo "for the schema; expected_pages are EDIT-stage expectations (eval.py)."
          fi
