# docsync — self-hosted dogfood loop.
#
# When docsync's own source changes on `main`, run docsync against itself and open a
# PR that updates the docs/ site to match. This is the live differentiator proven on
# docsync itself: a single repo, no cross-repo dispatch — the source and the docs live
# together, so install is editable (`pip install -e .`) and the diff/PR both target
# THIS repo via the auto-provided GITHUB_TOKEN.
#
# Required repo secret:
#   ANTHROPIC_API_KEY  — Opus edits + Haiku judge (the `api` backend).
# GITHUB_TOKEN is provided automatically by Actions and is used to (a) read the push
# diff via the GitHub API and (b) open the docs PR in this repo.
#
# Repo setting required once:
#   Settings -> Actions -> General -> Workflow permissions ->
#     "Allow GitHub Actions to create and approve pull requests"  (for --open-pr)
#
# Human-in-the-loop: this opens a PR and NEVER merges it. Keep branch protection on
# `main` requiring review so docsync's edits are always approved by a person.
name: docsync-self

on:
  push:
    branches: [main]
    paths:
      - "src/docsync/**"
  workflow_dispatch: {} # allow a manual re-run against the latest commit

permissions:
  contents: write # commit the doc updates to a branch
  pull-requests: write # open the docs PR

concurrency:
  group: docsync-self-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the push diff (before..after) resolves

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Same-repo install — docsync documents itself, so the engine is right here.
      - name: Install docsync
        run: pip install -e ".[embeddings]"

      - name: Identify the committer for the docs PR branch
        run: |
          git config user.name  "docsync[bot]"
          git config user.email "docsync-bot@users.noreply.github.com"

      # Best-effort: pull the run-history artifact from the most recent successful run
      # so the dashboard accumulates across CI runs. runs.jsonl is gitignored and is
      # NEVER committed into a docs PR — it travels only as an artifact. First run (or
      # an expired artifact) simply starts fresh; the `|| true` keeps that non-fatal.
      - name: Restore prior run history (best-effort)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .docsync/state
          PRIOR=$(gh run list --workflow=docsync-self.yml --status=success \
            --limit 1 --json databaseId -q '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$PRIOR" ]; then
            gh run download "$PRIOR" --name docsync-history --dir .docsync/state || true
          fi

      - name: Sync docs with the code change (opens a PR; never auto-merges)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # reads the diff via API (push) + opens the PR
        run: |
          # --polish: after each surgical edit, run a fact-frozen readability pass
          # (leading summary + scannable structure). Opt-in, one extra edit-model call
          # per updated page; falls back to the surgical edit on any failure.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: docsync can't parse a workflow_dispatch event, so diff the
            # latest commit against its parent from the full local checkout instead
            # (fetch-depth: 0 above guarantees HEAD~1 is present). Pass the workspace
            # PATH (not "."), so the diff's repo key is its last segment — "docsync" —
            # which matches the manifest anchors (impact._repo_key).
            docsync run \
              --src-repo "$GITHUB_WORKSPACE" --base HEAD~1 --head HEAD \
              --docs-repo . --backend api --open-pr --polish
          else
            docsync run \
              --from-event "$GITHUB_EVENT_PATH" \
              --docs-repo . --backend api --open-pr --polish
          fi

      # Render the activity dashboard from the (restored + this-run) history and publish
      # both as artifacts. Static HTML only — `--serve` is never used in CI. Runs even if
      # the sync step failed, so a failed run still updates the dashboard.
      - name: Build the docsync dashboard
        if: always()
        run: docsync dashboard --docs-repo . --out docsync-dashboard.html

      - name: Upload the dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docsync-dashboard
          path: docsync-dashboard.html
          if-no-files-found: ignore

      - name: Upload the run history (consumed by the next run's restore step)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docsync-history
          path: .docsync/state/runs.jsonl
          if-no-files-found: ignore
